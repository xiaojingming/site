name: Blog Content Rebuild

on:
  repository_dispatch:
    types: [blog-content-updated]
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch blog content
        run: node scripts/fetch-blog-data.js
        env:
          BLOG_CONTENT_REPO_URL: https://github.com/xiaojingming/costrict-blog-content.git

      - name: Build
        run: pnpm build

      - name: Deploy to remote server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          REMOTE_DIST="${{ secrets.REMOTE_PATH }}"
          REMOTE_BAK="${REMOTE_DIST}_bak"
          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=accept-new"

          # 1. 备份旧版本
          $SSH_CMD ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "rm -rf $REMOTE_BAK && cp -r $REMOTE_DIST $REMOTE_BAK"

          # 2. rsync 推送新版本
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=accept-new" \
            dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$REMOTE_DIST

          # 3. 修复权限并通知 Nginx 重载
          $SSH_CMD ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "chmod -R 755 $REMOTE_DIST && docker exec costrict-ai nginx -s reload || true"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
